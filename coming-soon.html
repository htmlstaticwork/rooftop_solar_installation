<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | SolarWave</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <section class="section-padding" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: var(--secondary); color: white;">
    <div class="container">
      <i data-lucide="cog" style="width: 80px; height: 80px; color: var(--primary); margin-bottom: 2rem; animation: rotate 4s linear infinite;"></i>
      <h1 style="font-size: 3.5rem; margin-bottom: 1.5rem;">Something <span>Amazing</span> is Coming</h1>
      <p style="color: #94A3B8; margin-bottom: 3rem; max-width: 600px; margin-inline: auto;">We are working hard to bring you the best solar energy management platform. Stay tuned and sign up for updates.</p>
      <div class="flex" style="justify-content: center; gap: 1rem; max-width: 500px; margin: 0 auto;">
         <input type="email" placeholder="Your Email" style="padding: 1rem; border-radius: 0.5rem; border: none; flex: 1;">
         <button class="btn btn-primary" style="padding: 1rem 2rem;">Notify Me</button>
      </div>
      <div style="margin-top: 3rem;"><a href="index.html" style="color: var(--primary); text-decoration: underline;">Go back to main site</a></div>
    </div>
  </section>
  <style>
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
  <script>lucide.createIcons();</script>
</body>
</html>
