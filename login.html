<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SolarWave</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: var(--surface); display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative;">

  <!-- Utility Toggles Top Right -->
  <div style="position: absolute; top: 2rem; right: 2rem; display: flex; gap: 1rem;">
    <button id="dark-mode-toggle" class="toggle-btn" title="Toggle Dark Mode"><i data-lucide="moon"></i></button>
    <button id="rtl-toggle" class="toggle-btn" title="Toggle RTL"><i data-lucide="languages"></i></button>
  </div>

  <div class="card" style="width: 100%; max-width: 450px; padding: 3rem; background: var(--background); box-shadow: var(--shadow-lg); border-radius: 1.5rem;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
      <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
        <i data-lucide="sun" style="color: var(--primary);"></i>
        Solar<span>Wave</span>
      </a>
      <h2 style="margin-top: 1rem; font-size: 1.5rem;">Welcome <span>Back</span></h2>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Monitor your energy from anywhere.</p>
    </div>

    <!-- Social Logins -->
    <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
      <button id="google-login" class="btn btn-outline" style="width: 100%; gap: 1rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.91 3.22-1.92 4.28-1.2 1.2-3.04 2.44-5.92 2.44-4.76 0-8.52-3.84-8.52-8.6s3.76-8.6 8.52-8.6c2.56 0 4.36 1 5.6 2.16l2.32-2.32C18.12 1.16 15.52 0 12.48 0 5.6 0 0 5.6 0 12.48s5.6 12.48 12.48 12.48c3.76 0 6.6-1.24 8.84-3.56 2.32-2.32 3.04-5.56 3.04-8.16 0-.6-.04-1.2-.12-1.84h-11.76z"/></svg>
        Continue with Google
      </button>
      <button id="apple-login" class="btn btn-outline" style="width: 100%; gap: 1rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.663-3.415-.037-.015-3.182-1.218-3.22-4.821-.026-3.003 2.453-4.437 2.568-4.513-1.408-2.065-3.562-2.3-4.331-2.351-1.844-.153-3.313 1.04-4.271 1.04zm2.146-2.93a4.762 4.762 0 001.077-3.388c-.026-.014-.052-.014-.078-.014-1.81.078-3.454 1.258-4.305 2.259-.858 1.014-1.621 2.652-1.405 4.1.03.015.06.015.09.015 1.597 0 3.2-1.014 4.621-2.972z"/></svg>
        Continue with Apple
      </button>
    </div>

    <div class="flex" style="margin-bottom: 2rem; color: var(--text-muted); font-size: 0.8rem; justify-content: center; gap: 0.5rem;">
      <div style="flex: 1; height: 1px; background: var(--border);"></div>
      OR
      <div style="flex: 1; height: 1px; background: var(--border);"></div>
    </div>

    <form style="display: flex; flex-direction: column; gap: 1.5rem;">
      <div>
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Email Address</label>
        <input type="email" placeholder="email@example.com" style="width: 100%; padding: 0.85rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--surface);" required>
      </div>
      <div>
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">Password</label>
        <div style="position: relative;">
           <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 0.85rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--surface);" required>
           <button type="button" id="toggle-password" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted);">
             <i data-lucide="eye" size="20"></i>
           </button>
        </div>
      </div>
      <div class="flex" style="justify-content: space-between; font-size: 0.85rem;">
        <label class="flex" style="gap: 0.5rem; cursor: pointer;">
          <input type="checkbox"> Remember Me
        </label>
        <a href="#" style="color: var(--primary); font-weight: 600;">Forgot Password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 0.5rem; font-weight: 700;">Login to Dashboard</button>
    </form>

    <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
      Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Create Account</a>
    </p>
  </div>

  <script src="assets/js/main.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
